<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060f"/>
      <stop offset="100%" style="stop-color:#0c0c1d"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#4d7cff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#06060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#06060f;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow1)"/>
  <rect width="1200" height="900" fill="url(#glow2)"/>
  <text x="600" y="380" font-family="sans-serif" font-size="72" font-weight="700" fill="url(#neon)" text-anchor="middle" letter-spacing="12">VIREALYS</text>
  <text x="600" y="440" font-family="sans-serif" font-size="18" fill="#7a8ba0" text-anchor="middle" letter-spacing="4" text-transform="uppercase">SLOW FOOD IMMERSIF &amp; ÉVOLUTIF</text>
  <line x1="480" y1="470" x2="720" y2="470" stroke="url(#neon)" stroke-width="1" opacity="0.4"/>
  <text x="600" y="510" font-family="sans-serif" font-size="22" fill="#c8d6e5" text-anchor="middle">Voyagez sans quitter votre table</text>
</svg>
